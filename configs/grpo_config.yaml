run_name: grpo-qwen2.5-1.5b
model_name_or_path: checkpoints/sft
output_dir: checkpoints/grpo
train_file: data/processed/grpo_train.jsonl
eval_file: data/processed/grpo_eval.jsonl
retriever_endpoint: http://127.0.0.1:5000/search
max_steps: 500
max_seq_length: 2048
load_in_4bit: true

rollout:
  max_turns: 4
  retrieval_top_k: 5
  temperature: 0.7
  top_p: 0.9

reward:
  answer_weight: 1.0
  format_weight: 0.2
  retrieval_weight: 0.3

trainer:
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 8
  learning_rate: 1.0e-5
  logging_steps: 5
  save_steps: 50
  eval_steps: 50
