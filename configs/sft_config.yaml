run_name: sft-qwen2.5-1.5b
model_name_or_path: /root/models/Qwen/Qwen2.5-1.5B-Instruct
train_file: data/processed/sft_train.jsonl
eval_file: data/processed/sft_eval.jsonl
output_dir: checkpoints/sft
max_seq_length: 2048
load_in_4bit: true

lora:
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

training:
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 8
  learning_rate: 2.0e-4
  num_train_epochs: 1
  warmup_ratio: 0.03
  logging_steps: 10
  save_steps: 100
  eval_steps: 100
  seed: 42
