run_name: sft-qwen2.5-1.5b
model_name_or_path: /root/models/Qwen/Qwen2.5-1.5B-Instruct
train_file: data/processed/sft_train.jsonl
eval_file: data/processed/sft_eval.jsonl
output_dir: checkpoints/sft
max_seq_length: 2048
load_in_4bit: true

lora:
  r: 16
  alpha: 16
  dropout: 0.0
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

training:
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 4     # effective batch size = 8
  learning_rate: 2.0e-4
  num_train_epochs: 3                # 500 条小数据的经验甜点
  warmup_ratio: 0.1                  # lr=2e-4 需要较长 warmup
  logging_steps: 5
  seed: 42
# eval/save 都走 epoch 粒度,见 docs/m4.md 坑点 4
